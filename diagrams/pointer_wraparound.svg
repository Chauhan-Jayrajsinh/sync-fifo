<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">Extra-MSB Pointer Technique: Full vs Empty</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#555">FIFO_DEPTH = 4 example, pointer width = 3 bits (2 address bits + 1 wrap bit)</text>

  <!-- EMPTY case -->
  <text x="220" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a6b1a">EMPTY: wr_ptr == rd_ptr (fully equal)</text>
  <rect x="90" y="115" width="60" height="40" fill="#e6f9ec" stroke="#2f9e44"/>
  <text x="120" y="140" text-anchor="middle" font-size="13" font-family="monospace">000</text>
  <text x="120" y="172" text-anchor="middle" font-size="11" fill="#333">wr_ptr</text>
  <rect x="90" y="185" width="60" height="40" fill="#fff4e6" stroke="#e8590c"/>
  <text x="120" y="210" text-anchor="middle" font-size="13" font-family="monospace">000</text>
  <text x="120" y="242" text-anchor="middle" font-size="11" fill="#333">rd_ptr</text>
  <text x="220" y="150" font-size="11" fill="#555">MSB match (0=0)</text>
  <text x="220" y="168" font-size="11" fill="#555">lower bits match (00=00)</text>
  <text x="220" y="186" font-size="11" fill="#1a6b1a" font-weight="bold">-&gt; empty = 1</text>

  <!-- FULL case -->
  <text x="680" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#a33" >FULL: same address, different wrap bit</text>
  <rect x="550" y="115" width="60" height="40" fill="#e6f9ec" stroke="#2f9e44"/>
  <text x="580" y="140" text-anchor="middle" font-size="13" font-family="monospace">100</text>
  <text x="580" y="172" text-anchor="middle" font-size="11" fill="#333">wr_ptr</text>
  <rect x="550" y="185" width="60" height="40" fill="#fff4e6" stroke="#e8590c"/>
  <text x="580" y="210" text-anchor="middle" font-size="13" font-family="monospace">000</text>
  <text x="580" y="242" text-anchor="middle" font-size="11" fill="#333">rd_ptr</text>
  <text x="680" y="150" font-size="11" fill="#a33">MSB differs (1 vs 0) -&gt; wrote all the way around</text>
  <text x="680" y="168" font-size="11" fill="#555">lower bits match (00 = 00, same slot)</text>
  <text x="680" y="186" font-size="11" fill="#a33" font-weight="bold">-&gt; full = 1</text>

  <!-- Circular buffer visual -->
  <text x="450" y="290" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">Why it works: the wrap (MSB) bit tracks how many times each pointer has looped</text>
  <circle cx="450" cy="360" r="45" fill="none" stroke="#888" stroke-width="1.5"/>
  <text x="450" y="325" text-anchor="middle" font-size="10" fill="#555">0</text>
  <text x="497" y="365" text-anchor="middle" font-size="10" fill="#555">1</text>
  <text x="450" y="410" text-anchor="middle" font-size="10" fill="#555">2</text>
  <text x="403" y="365" text-anchor="middle" font-size="10" fill="#555">3</text>
  <text x="450" y="365" text-anchor="middle" font-size="11" fill="#333">4-slot ring</text>
  <text x="450" y="392" text-anchor="middle" font-size="10" fill="#555" font-style="italic"> </text>
</svg>
