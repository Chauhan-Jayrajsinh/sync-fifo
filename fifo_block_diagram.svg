<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>
  <rect width="900" height="460" fill="#ffffff"/>
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">Synchronous FIFO - Block Diagram</text>

  <!-- Outer module boundary -->
  <rect x="60" y="60" width="780" height="360" rx="10" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="80" y="80" font-size="13" fill="#666">Sync_FIFO (clk, rst_n)</text>

  <!-- Memory array -->
  <rect x="330" y="150" width="240" height="140" rx="6" fill="#e8f0fe" stroke="#3b5bdb" stroke-width="2"/>
  <text x="450" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">Memory Array</text>
  <text x="450" y="195" text-anchor="middle" font-size="12" fill="#333">mem[0 : DEPTH-1]</text>
  <line x1="345" y1="205" x2="555" y2="205" stroke="#3b5bdb" stroke-width="1"/>
  <line x1="345" y1="225" x2="555" y2="225" stroke="#3b5bdb" stroke-width="1"/>
  <line x1="345" y1="245" x2="555" y2="245" stroke="#3b5bdb" stroke-width="1"/>
  <text x="450" y="278" text-anchor="middle" font-size="11" fill="#555">width = DATA_WIDTH</text>

  <!-- Write pointer logic -->
  <rect x="90" y="150" width="180" height="90" rx="6" fill="#e6f9ec" stroke="#2f9e44" stroke-width="2"/>
  <text x="180" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">wr_ptr</text>
  <text x="180" y="193" text-anchor="middle" font-size="11" fill="#333">[PTR_WIDTH:0]</text>
  <text x="180" y="210" text-anchor="middle" font-size="10" fill="#555">extra MSB = wrap bit</text>

  <!-- Read pointer logic -->
  <rect x="630" y="150" width="180" height="90" rx="6" fill="#fff4e6" stroke="#e8590c" stroke-width="2"/>
  <text x="720" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">rd_ptr</text>
  <text x="720" y="193" text-anchor="middle" font-size="11" fill="#333">[PTR_WIDTH:0]</text>
  <text x="720" y="210" text-anchor="middle" font-size="10" fill="#555">extra MSB = wrap bit</text>

  <!-- Comparator -->
  <rect x="360" y="330" width="180" height="60" rx="6" fill="#f3e8fd" stroke="#862e9c" stroke-width="2"/>
  <text x="450" y="355" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Full / Empty</text>
  <text x="450" y="373" text-anchor="middle" font-size="11" fill="#333">MSB+lower-bit compare</text>

  <!-- Inputs -->
  <text x="20" y="168" font-size="12" fill="#1a1a1a">wr_en</text>
  <text x="20" y="230" font-size="12" fill="#1a1a1a">wr_data</text>
  <text x="20" y="325" font-size="12" fill="#1a1a1a">clk, rst_n</text>

  <text x="880" y="168" text-anchor="end" font-size="12" fill="#1a1a1a">rd_en</text>
  <text x="880" y="230" text-anchor="end" font-size="12" fill="#1a1a1a">rd_data</text>

  <!-- Arrows: inputs to pointer blocks -->
  <line x1="55" y1="165" x2="88" y2="165" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="55" y1="225" x2="328" y2="225" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="845" y1="165" x2="812" y2="165" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="845" y1="225" x2="572" y2="225" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- wr_ptr -> mem (write address) -->
  <line x1="270" y1="190" x2="330" y2="190" stroke="#2f9e44" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- rd_ptr -> mem (read address) -->
  <line x1="630" y1="190" x2="570" y2="190" stroke="#e8590c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- wr_ptr, rd_ptr -> comparator -->
  <line x1="200" y1="240" x2="200" y2="360" stroke="#2f9e44" stroke-width="1.5"/>
  <line x1="200" y1="360" x2="358" y2="360" stroke="#2f9e44" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="240" x2="700" y2="360" stroke="#e8590c" stroke-width="1.5"/>
  <line x1="700" y1="360" x2="542" y2="360" stroke="#e8590c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- comparator outputs -->
  <text x="450" y="420" text-anchor="middle" font-size="12" fill="#1a1a1a">full, empty (outputs)</text>
  <line x1="450" y1="390" x2="450" y2="408" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

</svg>
