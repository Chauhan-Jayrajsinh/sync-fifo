<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>
  <rect width="900" height="400" fill="#ffffff"/>
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">Self-Checking Testbench Architecture</text>

  <!-- Test sequencer -->
  <rect x="40" y="80" width="160" height="70" rx="6" fill="#e8f0fe" stroke="#3b5bdb" stroke-width="2"/>
  <text x="120" y="110" text-anchor="middle" font-size="13" font-weight="bold">Test Sequence</text>
  <text x="120" y="128" text-anchor="middle" font-size="10" fill="#333">fill / drain / wrap / random</text>

  <!-- Stimulus tasks -->
  <rect x="260" y="80" width="160" height="70" rx="6" fill="#e6f9ec" stroke="#2f9e44" stroke-width="2"/>
  <text x="340" y="105" text-anchor="middle" font-size="13" font-weight="bold">Stimulus Tasks</text>
  <text x="340" y="123" text-anchor="middle" font-size="10" fill="#333">do_write() / do_read()</text>
  <text x="340" y="139" text-anchor="middle" font-size="10" fill="#333">respect full / empty</text>

  <!-- DUT -->
  <rect x="480" y="80" width="160" height="70" rx="6" fill="#fff4e6" stroke="#e8590c" stroke-width="2"/>
  <text x="560" y="110" text-anchor="middle" font-size="13" font-weight="bold">DUT</text>
  <text x="560" y="128" text-anchor="middle" font-size="10" fill="#333">Sync_FIFO</text>

  <!-- Scoreboard -->
  <rect x="480" y="220" width="160" height="90" rx="6" fill="#f3e8fd" stroke="#862e9c" stroke-width="2"/>
  <text x="560" y="248" text-anchor="middle" font-size="13" font-weight="bold">Scoreboard</text>
  <text x="560" y="266" text-anchor="middle" font-size="10" fill="#333">golden reference array</text>
  <text x="560" y="282" text-anchor="middle" font-size="10" fill="#333">sb_wr_ptr / sb_rd_ptr</text>
  <text x="560" y="298" text-anchor="middle" font-size="10" fill="#333">push on write, pop-compare on read</text>

  <!-- Checker/report -->
  <rect x="260" y="220" width="160" height="90" rx="6" fill="#ffe3e3" stroke="#c92a2a" stroke-width="2"/>
  <text x="340" y="248" text-anchor="middle" font-size="13" font-weight="bold">Checker</text>
  <text x="340" y="266" text-anchor="middle" font-size="10" fill="#333">rd_data === expected ?</text>
  <text x="340" y="282" text-anchor="middle" font-size="10" fill="#333">checks++ / errors++</text>
  <text x="340" y="298" text-anchor="middle" font-size="10" fill="#333">PASS / FAIL report</text>

  <!-- Arrows -->
  <line x1="200" y1="115" x2="258" y2="115" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="420" y1="115" x2="478" y2="115" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="340" y1="150" x2="340" y2="218" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="352" y="185" font-size="9" fill="#555">on write: push expected</text>

  <line x1="560" y1="150" x2="560" y2="218" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="572" y="185" font-size="9" fill="#555">on read: rd_data</text>

  <line x1="480" y1="265" x2="422" y2="265" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="450" y="255" font-size="9" fill="#555">pop expected</text>

  <text x="450" y="360" text-anchor="middle" font-size="12" fill="#555" font-style="italic">
    Key idea: a SW queue/array acts as a reference-model FIFO - no separate golden RTL model needed.
  </text>
</svg>
